# ============================================================
# L2 行政法规 配置
# 层级代码: L2 | 版本: 2026-04-17
# ============================================================

meta:
  code: L2
  name: 行政法规
  version: "2026-04-17"
  description: >
    国务院制定的行政法规。
    包括：网络数据安全管理条例、关键信息基础设施安全保护条例、
    数据出境安全评估办法等。
    效力仅次于国家法律，是数据安全合规体系的核心上层建筑。

# ----------------------------------------------------------
# 字段定义
# ----------------------------------------------------------
fields:
  # 通用字段
  - field_name: 法规标题
    field_id: title
    type: text
    required: true
    description: 法规文件标题

  - field_name: 层级
    field_id: level
    type: text
    required: true
    description: 固定值 L2

  - field_name: 法规类型
    field_id: law_type
    type: single_select
    required: true
    description: 固定值"行政法规"

  - field_name: 发文机关
    field_id: author
    type: text
    required: true
    description: 固定值"国务院"

  - field_name: 文号
    field_id: doc_number
    type: text
    required: false
    description: 国令第XXX号 / 国发[YYYY]XX号

  - field_name: 发布日期
    field_id: publish_date
    type: date
    required: true
    description: 官方发布日期

  - field_name: 生效日期
    field_id: effective_date
    type: date
    required: false
    description: 法规生效日期

  - field_name: 状态
    field_id: status
    type: single_select
    required: true
    description: 现行/废止/修订

  - field_name: 原文链接
    field_id: source_url
    type: hyperlink
    required: true
    description: 官方来源URL

  - field_name: 标签
    field_id: tags
    type: multi_select
    required: false
    description: 关键词标签

  # L2 独有字段
  - field_name: 施行日期
    field_id: enforcement_date
    type: date
    required: false
    description: 条例施行日期

  - field_name: 废止日期
    field_id: abolition_date
    type: date
    required: false
    description: 被废止时的日期

  - field_name: 全文存储路径
    field_id: local_path
    type: text
    required: false
    description: 本地全文PDF/DOC路径

# ----------------------------------------------------------
# 信息源
# ----------------------------------------------------------
sources:
  - source_id: cac_l2
    name: 网信办-行政法规
    url: https://www.cac.gov.cn
    search_url: https://www.cac.gov.cn/cms/JsonList
    type: json_api
    method: cac_api
    parser: parse_cac_json
    channel_code: A09370302
    status: available
    rate_limit: 1
    note: CAC 行政法规数据库，JSON API

  - source_id: gov_council
    name: 国务院政策文件库
    url: https://www.gov.cn
    search_url: https://www.gov.cn/zhengce/
    type: html_server
    method: http_get
    parser: parse_gov_html
    status: available
    rate_limit: 2
    encoding: gbk
    note: 政府官网，可访问，内容需编码处理

# ----------------------------------------------------------
# 爬取参数
# ----------------------------------------------------------
crawl_params:
  lookback_days: 365
  keywords: [网络数据安全, 关键信息基础设施, 数据出境, 个人信息, 网络安全]
  sort_by: publish_date
  sort_order: desc
  priority: high
  enable_full_text_download: true
  file_types: [pdf, doc, docx]

# ----------------------------------------------------------
# 飞书多维表格字段映射
# ----------------------------------------------------------
bitable:
  table_name: 法规主表
  field_mappings:
    法规标题: title
    层级: level
    法规类型: law_type
    发文机关: author
    文号: doc_number
    发布日期: publish_date
    生效日期: effective_date
    状态: status
    原文链接: source_url
    标签: tags
    施行日期: enforcement_date
    废止日期: abolition_date
    全文存储路径: local_path
