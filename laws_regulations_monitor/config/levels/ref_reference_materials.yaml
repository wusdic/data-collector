bitable:
  field_mappings:
    全文存储路径: local_path
    关联法规: related_laws
    原文链接: source_url
    发布日期: publish_date
    发布机构: author
    层级: level
    摘要: summary
    标签: tags
    版本号: version
    资料标题: title
    资料类型: doc_type
    适用行业: applicable_industry
  table_name: 参考资料库
crawl_params:
  enable_full_text_download: true
  file_types:
  - pdf
  keywords:
  - 数据安全指南
  - 个人信息保护指南
  - 网络安全最佳实践
  - 白皮书
  - 技术报告
  - 研究报告
  - 合规指南
  - 个人信息安全规范
  - 数据安全能力
  lookback_days: 730
  priority: low
  sort_by: publish_date
  sort_order: desc
fields:
- description: 资料名称
  field_id: title
  field_name: 资料标题
  required: true
  type: text
- description: 固定值 REF
  field_id: level
  field_name: 层级
  required: true
  type: text
- description: 指南/白皮书/蓝皮书/最佳实践/技术报告/研究报告/研究成果/解读
  field_id: doc_type
  field_name: 资料类型
  required: true
  type: single_select
- description: 发布指南/报告的机构名称
  field_id: author
  field_name: 发布机构
  required: true
  type: text
- description: 资料发布日期
  field_id: publish_date
  field_name: 发布日期
  required: true
  type: date
- description: 官方来源URL
  field_id: source_url
  field_name: 原文链接
  required: true
  type: hyperlink
- description: 关键词标签
  field_id: tags
  field_name: 标签
  required: false
  type: multi_select
- description: 所参考或解读的具体法规（层级或名称）
  field_id: related_laws
  field_name: 关联法规
  required: false
  type: multi_select
- description: 资料主要内容摘要
  field_id: summary
  field_name: 摘要
  required: false
  type: text
- description: 指南适用的行业范围
  field_id: applicable_industry
  field_name: 适用行业
  required: false
  type: multi_select
- description: 指南/标准的版本，如 V1.0 / 2023版
  field_id: version
  field_name: 版本号
  required: false
  type: text
- description: 本地全文PDF/DOC路径
  field_id: local_path
  field_name: 全
  required: false
  type: text
meta:
  code: REF
  description: '非强制性参考材料。 包括：指南、白皮书、蓝皮书、最佳实践、技术报告、 研究报告、研究成果等。 参考资料库供合规建设参考，虽无法律效力，但对理解监管趋势
    和技术要求具有重要价值。

    '
  name: 参考资料库
  version: '2026-04-17'
sources:
- name: 中国信通院CAICT
  note: caict.ac.cn返回412(需要特殊headers)
  status: blocked
- name: 电子标准院CESI
  note: DNS不通
  status: blocked
- name: 赛博研究院
  note: DNS不通
  status: blocked
- name: 工信部指导文件
  note: 需要JS渲染
  status: blocked
