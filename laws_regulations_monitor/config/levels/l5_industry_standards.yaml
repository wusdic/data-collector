bitable:
  field_mappings:
    全文存储路径: local_path
    原文链接: source_url
    发布日期: publish_date
    发文机关: author
    层级: level
    归口单位: technical_committee
    文号: doc_number
    标准代号: standard_prefix
    标准编号: standard_number
    标签: tags
    法规标题: title
    法规类型: law_type
    状态: status
    生效日期: effective_date
    行业分类: industry
  table_name: 法规主表
crawl_params:
  enable_full_text_download: true
  file_types:
  - pdf
  keywords:
  - 数据安全
  - 个人信息
  - 网络安全
  - 金融数据
  - 电信数据
  lookback_days: 365
  priority: medium
  sort_by: publish_date
  sort_order: desc
fields:
- description: 标准名称
  field_id: title
  field_name: 法规标题
  required: true
  type: text
- description: 固定值 L5
  field_id: level
  field_name: 层级
  required: true
  type: text
- description: 行业标准
  field_id: law_type
  field_name: 法规类型
  required: true
  type: single_select
- description: 发布行业标准的主管部门
  field_id: author
  field_name: 发文机关
  required: true
  type: text
- description: JR/T XXXX-XXXX / YD/T XXXX / GA/T XXXX-XXXX 等格式
  field_id: doc_number
  field_name: 文号
  required: true
  type: text
- description: 标准发布日期
  field_id: publish_date
  field_name: 发布日期
  required: true
  type: date
- description: 标准实施日期
  field_id: effective_date
  field_name: 生效日期
  required: false
  type: date
- description: 现行/废止/修订
  field_id: status
  field_name: 状态
  required: true
  type: single_select
- description: 官方来源URL
  field_id: source_url
  field_name: 原文链接
  required: true
  type: hyperlink
- description: 关键词标签
  field_id: tags
  field_name: 标签
  required: false
  type: multi_select
- description: 如 JR/T 0197-2020，YD/T 3958-2021
  field_id: standard_number
  field_name: 标准编号
  required: true
  type: text
- description: JR/T（金融）/ YD/T（通信）/ GA/T（公安）/ WS/T（卫生）/ MT/T（煤炭）等
  field_id: standard_prefix
  field_name: 标准代号
  required: true
  type: single_select
- description: 金融/电信/公安/卫生/交通/教育/能源
  field_id: industry
  field_name: 行业分类
  required: true
  type: single_select
- description: 归口技术委员会或主管部门
  field_id: technical_committee
  field_name: 归口单位
  required: false
  type: text
- description: 本地全文PDF路径
  field_id: local_path
  field_name: 全文存储路径
  required: false
  type: text
meta:
  code: L5
  description: '各行业主管部门发布的行业标准。 金融（JR/T）、电信（YD/T）、公安（GA/T）、 卫生（WS/T）、交通等数据安全相关行业标准。
    通常为推荐性标准，在对应行业内具有强制参考效力。

    '
  name: 行业标准
  version: '2026-04-17'
sources:
- name: TC260信息安全标准委员会
  note: www.tc260.org.cn ✅ 可爬取，30条/次
  status: available
- name: CAC部门函件(A09370305)
  note: CAC JSON API ✅
  status: available
- name: 工信部政策法规
  note: 需要JS渲染，requests无法获取内容
