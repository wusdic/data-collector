bitable:
  field_mappings:
    全文存储路径: local_path
    原文链接: source_url
    处罚/审理机关: authority
    处罚文号: penalty_number
    处罚类型: penalty_type
    处罚结果: result
    层级: level
    整改要求: remediation
    标签: tags
    案例日期: case_date
    案例标题: title
    案例类型: case_type
    案情摘要: summary
    涉及法规: related_laws
    罚款金额: penalty_amount
    被处罚主体: violator
    认定要点: key_points
  table_name: 执法案例库
crawl_params:
  enable_full_text_download: true
  file_types:
  - pdf
  keywords:
  - 数据安全
  - 个人信息
  - App违法违规
  - 网络安全
  - 行政处罚
  - 执法案例
  lookback_days: 730
  priority: high
  sort_by: case_date
  sort_order: desc
fields:
- description: 处罚决定书标题或案例简称
  field_id: title
  field_name: 案例标题
  required: true
  type: text
- description: 固定值 EDB
  field_id: level
  field_name: 层级
  required: true
  type: text
- description: 行政处罚决定书/典型案例/监管约谈/专项行动
  field_id: case_type
  field_name: 案例类型
  required: true
  type: single_select
- description: 网信办/工信部/公安部/市场监管总局/省市监局
  field_id: authority
  field_name: 处罚/审理机关
  required: true
  type: text
- description: 处罚决定日期或案例发布日期
  field_id: case_date
  field_name: 案例日期
  required: true
  type: date
- description: 涉及的法规层级或具体法规名称
  field_id: related_laws
  field_name: 涉及法规
  required: false
  type: multi_select
- description: 简要描述违规事实
  field_id: summary
  field_name: 案情摘要
  required: false
  type: text
- description: 监管部门认定的违规行为要点
  field_id: key_points
  field_name: 认定要点
  required: false
  type: text
- description: 处罚内容，如罚款金额/责令改正/下架App
  field_id: result
  field_name: 处罚结果
  required: false
  type: text
- description: 官方来源URL
  field_id: source_url
  field_name: 原文链接
  required: true
  type: hyperlink
- description: 关键词标签
  field_id: tags
  field_name: 标签
  required: false
  type: multi_select
- description: 被处罚的企业/单位/个人名称
  field_id: violator
  field_name: 被处罚主体
  required: false
  type: text
- description: 行政处罚决定书文号
  field_id: penalty_number
  field_name: 处罚文号
  required: false
  type: text
- description: 罚款/责令改正/警告/下架/吊销许可证/行政拘留
  field_id: penalty_type
  field_name: 处罚类型
  required: false
  type: multi_select
- description: 罚款金额（万元），无罚款则留空
  field_id: penalty_amount
  field_name: 罚款金额
  required: false
  type: number
- description: 整改要求或期限
  field_id: remediation
  field_name: 整改要求
  required: false
  type: text
- description: 本地全文PDF/DOC路径
  field_id: local_path
  field_name: 全文存储路径
  required: false
  type: text
meta:
  code: EDB
  description: '监管机构公开发布的执法案例、行政处罚决定书。 包括：国家互联网信息办公室、工业和信息化部、 公安部、市场监管总局等部门的执法记录和处罚决定。
    案例库是合规体系建设的重要参考，用于了解执法口径和典型违规行为。

    '
  name: 执法案例库
  version: '2026-04-17'
